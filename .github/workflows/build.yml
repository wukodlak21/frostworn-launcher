name: Build Frostworn Launcher

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore "Source/Oracle Lite.csproj"

    - name: Build Release
      run: msbuild "Source/Oracle Lite.csproj" /p:Configuration=Release /p:Platform=AnyCPU

    - name: Rename output
      run: |
        copy "Source\bin\Release\FrostwornLauncher.exe" "FrostwornLauncher.exe"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FrostwornLauncher
        path: FrostwornLauncher.exe
        retention-days: 30
